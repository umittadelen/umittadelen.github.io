<body>
    <!-- Custom cursor -->

    <!-- Scrollbar -->

        <div class="thumb" id="scroll-thumb"></div>

    <!-- Navigation -->

            <span>scroll</span>

        </div>

    <!-- Sections built by builder.js -->
    <main id="body"></main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>

    <script src="./scripts/builder.js"></script>
    <script src="./scripts/aboutme.js"></script>
    <script src="./scripts/cursor.js"></script>
    <script src="./scripts/scrollbar.js"></script>
    <script src="./scripts/favicon.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof lucide !== "undefined") lucide.createIcons();

            // Liquid sliding nav indicator
            const navLinks = document.querySelector('.nav-links');
            const links = Array.from(navLinks.querySelectorAll('a'));
            const indicator = document.createElement('div');
            indicator.className = 'nav-indicator';
            navLinks.prepend(indicator);
            gsap.set(indicator, { opacity: 0 });

            let visible = false;

            function moveTo(link) {
                const navRect = navLinks.getBoundingClientRect();
                const linkRect = link.getBoundingClientRect();
                const x = linkRect.left - navRect.left;
                const w = linkRect.width;
                if (!visible) {
                    gsap.set(indicator, { x, width: w });
                    gsap.to(indicator, { opacity: 1, duration: 0.12 });
                    visible = true;
                } else {
                    gsap.to(indicator, {
                        x, width: w,
                        duration: 0.6,
                        ease: 'elastic.out(1, 0.62)',
                        overwrite: true
                    });
                    gsap.to(indicator, { opacity: 1, duration: 0.1, overwrite: false });
                }
            }

            links.forEach(link => link.addEventListener('mouseenter', () => moveTo(link)));
            navLinks.addEventListener('mouseleave', () => {
                gsap.to(indicator, { opacity: 0, duration: 0.2, overwrite: true });
                visible = false;
            });
        });
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5340331733632234" crossorigin="anonymous"></script>
